<ion-header [translucent]="true">
  <ion-toolbar>
    <!-- LEFT: Title = Person name -->
    <ion-buttons slot="start">
      <ion-button size="large">{{ pData?.name }}</ion-button>
    </ion-buttons>

    <!-- RIGHT: navigation icons -->
    <ion-buttons slot="end">
      <ion-button shape="round" [routerLink]="['/home']">
        <ion-icon slot="icon-only" name="home"></ion-icon>
      </ion-button>
      <ion-button shape="round" [routerLink]="['/favourites']">
        <ion-icon slot="icon-only" name="heart"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>  
</ion-header>

<ion-content [fullscreen]="true"> 
  <ion-card>

  <ion-item>
    <div #overview style="height: 8px;"></div>
  </ion-item>
  <!--excluding if backdrop_path is null --> 
  <ion-item>
  <img *ngIf="pData.profile_path"
    alt= "{{ pData.name }}"
    [src]="imageLink + pData.profile_path"
    style="width:123px; margin-right:11px;" />

  <ion-label *ngIf="!pData.profile_path">
    No image</ion-label>
  </ion-item>

  <ion-item>
    <ion-label *ngIf="pData.also_known_as">
      {{ pData.also_known_as.join(', ') }}
    </ion-label>  
    <ion-label *ngIf="!pData.also_known_as">
      -
    </ion-label>
  </ion-item>

  <ion-item *ngIf="pData?.birthday || pData?.deathday || pData?.place_of_birth">
    <ion-label>
      <h2>{{ pData?.birthday }} - {{ pData?.deathday }}</h2>
      <p>{{ pData?.place_of_birth }}</p>
      <br>
      <p>{{ pData?.biography }}</p>
    </ion-label>
  </ion-item>
</ion-card>

   <!-- Movie list: with ratings + clickable) -->
<ion-card>
  <ion-item>
    <h1>Movies</h1>
  </ion-item>

  <ion-item *ngFor="let pm of pMData"
  button [routerLink]="['/movie-details', pm.id]">

     <img *ngIf="pm.poster_path"
       
       [src]="imageLink + pm.poster_path"
       style="width:123px; margin-right:11px;" />
       
     <ion-label *ngIf="!pm.poster_path">
       No image</ion-label>
   <!-- TV shows has name instead of title -->
       <ion-label>
        {{ pm?.title || pm?.name }} ({{ pm?.vote_average }})
           <!-- character name -->
        <p *ngIf="pm?.character">{{ pm.character }}</p>
      </ion-label>
  </ion-item>
   
</ion-card>

</ion-content>
