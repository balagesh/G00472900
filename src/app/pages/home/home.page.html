<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title></ion-title>
    <ion-buttons slot="start">
      <ion-button size="large">G00472900</ion-button>
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-button shape="round" [routerLink]="['/favourites']">
        <ion-icon slot="icon-only" name="heart"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <!-- SEARCH BAR -->
  <ion-card>
    <ion-searchbar [value]="searched" [debounce]="1000" (ionInput)="handleInput($event)"></ion-searchbar>
  <ion-button expand="block" color="primary" (click)="searchMovies()">
    SEARCH
  </ion-button>
</ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title><h2>
        {{ pageTitle }}
      </h2></ion-card-title>
  </ion-card-header>
</ion-card>

  <!-- clickable elements, select movie with method in ts file -->
  <!-- It was a div element, but I merged into the Ionic element later  -->
<ion-card *ngFor="let m of movieData" [routerLink]="['/movie-details', m.id]">

  <ion-card-header>
      <ion-card-title>{{ m.title }}</ion-card-title>
  </ion-card-header>

  <ion-card-content>
  <!--excluding if backdrop_path is n-->
  <img 
  *ngIf="m.backdrop_path"
  alt= "{{ m.title }}" [src]="imageLink + m.backdrop_path" />
  <br>
  
    {{ m.overview }}
  </ion-card-content>

</ion-card>
</ion-content>
